server:
  port: 8081
  servlet:
    context-path: /secKillOrder
spring:
  application:
    name: mall-secKillOrder
  datasource:
    url: jdbc:mysql://localhost:3306/lyc_mall?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: 192.168.40.128
    port: 6379
    password: Lyc123456.
    timeout: 60000
  rabbitmq:
    host: 192.168.40.128
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.40.128:8848
mybatis-plus:
  #  config-location: classpath:mybatis-config.xml
  mapper-locations: classpath*:/mapping/**/*.xml
  # 实体类别名包（用于简化 XML 中的类型引用）
  type-aliases-package: com.lyc.learn.entity
  configuration:
    # 开启 SQL 日志打印（开发阶段建议开启）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启驼峰命名映射（数据库 user_name → 实体 userName）
    map-underscore-to-camel-case: true
alipay:
  # 沙箱网关地址（固定）
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  # 你的沙箱应用APPID
  app-id: 9021000164635496
  # 你的应用私钥
  merchant-private-key: 
  # 支付宝公钥（注意不是应用公钥）
  alipay-public-key: 
  # 异步通知地址（本地开发时需内网穿透，稍后讲解）
  notify-url: https://你的内网穿透域名/api/alipay/notify
  # 页面跳转同步通知地址
  return-url: http://127.0.0.1:8888/seckill#/seckill
  # 字符编码格式
  charset: UTF-8
  # 签名方式
  sign-type: RSA2
  # 返回数据格式
  format: json
